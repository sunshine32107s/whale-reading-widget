<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Reading Stats Widget</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
        system-ui, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #e9f5ff;
    }
    .card {
      width: 280px;
      border-radius: 18px;
      padding: 16px 18px 14px;
      background: radial-gradient(circle at top left, #3fa4ff, #151b3f 65%, #050814);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.55);
      position: relative;
      overflow: hidden;
    }
    .title {
      font-size: 13px;
      opacity: 0.9;
    }
    .subtitle {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 2px;
    }
    .big-number {
      margin-top: 10px;
      font-size: 26px;
      font-weight: 600;
    }
    .big-number span {
      font-size: 14px;
      opacity: 0.8;
      margin-left: 4px;
    }
    .years {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.6;
    }
    .year-row {
      display: flex;
      justify-content: space-between;
      opacity: 0.9;
    }
    .year-label {
      color: #b9d8ff;
    }
    .count-label {
      color: #ffffff;
    }
    .whale-tag {
      position: absolute;
      right: 16px;
      bottom: 12px;
      font-size: 11px;
      opacity: 0.85;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .whale-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #9ad7ff, #4b8dff);
      box-shadow: 0 0 8px rgba(100, 193, 255, 0.9);
    }
    .error {
      margin-top: 8px;
      font-size: 11px;
      color: #ffb3b3;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">오늘까지 완독한 책</div>
    <div class="subtitle" id="dateText">로딩 중...</div>
    <div class="big-number" id="totalCount">- <span>권</span></div>

    <div class="years" id="yearStats">
      <!-- 연도별 통계가 여기에 채워짐 -->
    </div>

    <div class="whale-tag">
      <div class="whale-dot"></div>
      <span>whale reading</span>
    </div>

    <div class="error" id="errorText" style="display: none;"></div>
  </div>

  <script>
    async function fetchStats() {
      const dateEl = document.getElementById("dateText");
      const totalEl = document.getElementById("totalCount");
      const yearsEl = document.getElementById("yearStats");
      const errEl = document.getElementById("errorText");

      try {
        // TODO: 이 URL을 네가 배포한 서버 주소로 바꿔줘
        const res = await fetch("https://whale-reading-api.vercel.app/api/reading-stats");
        if (!res.ok) throw new Error("API 응답 오류");

        const data = await res.json();
        const { today, totalCompletedCount, yearStats } = data;

        dateEl.textContent = `${today} 기준`;
        totalEl.innerHTML = `${totalCompletedCount}<span> 권</span>`;

        if (!yearStats || yearStats.length === 0) {
          yearsEl.textContent = "아직 완독한 책이 없어요 🐋";
        } else {
          yearsEl.innerHTML = yearStats
            .map(
              (y) => `
            <div class="year-row">
              <span class="year-label">${y.year}년</span>
              <span class="count-label">${y.count}권</span>
            </div>
          `
            )
            .join("");
        }
      } catch (e) {
        console.error(e);
        errEl.style.display = "block";
        errEl.textContent = "데이터를 불러오지 못했어요.";
        dateEl.textContent = "오류 발생";
      }
    }

    fetchStats();
  </script>
</body>
</html>
