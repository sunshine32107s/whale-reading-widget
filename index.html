<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Reading Stats Widget - Neon Blue Set</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    
    /* 1. 직전 주제 위젯과 크기 및 배경 색감 완벽 통일 (세트 매칭) */
    .card {
      width: 280px; /* 원래 카운트 위젯 고유의 컴팩트 가로폭 */
      height: 380px; /* 주제 위젯과 나란히 두었을 때 밸런스가 맞는 세로 높이 */
      border-radius: 20px;
      padding: 24px;
      /* 🌌 직전 주제 위젯과 완벽히 일치하는 화사한 네온 블루 그라데이션 */
      background: linear-gradient(135deg, #6bb5ff 0%, #1c52d9 60%, #0d2873 100%);
      /* 🌫️ 부담스럽지 않게 보정했던 은은한 푸른빛 그림자 */
      box-shadow: 0 10px 25px rgba(13, 40, 115, 0.2); 
      position: relative;
      display: flex;
      flex-direction: column;
      color: #ffffff;
    }
    
    .title { font-size: 14px; color: #ffffff; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 11px; color: rgba(255, 255, 255, 0.75); font-weight: 500; margin-top: 2px; }
    
    /* 대형 총 권 수 수치 레이아웃 */
    .big-number { 
      margin: 18px 0 12px 0; 
      font-size: 34px; 
      font-weight: 700; 
      color: #ffffff; 
      letter-spacing: -0.5px;
    }
    .big-number span { font-size: 16px; font-weight: 500; opacity: 0.8; margin-left: 3px; }
    
    /* 2. 연도별 차트 리스트 영역 */
    .years-container {
      margin-top: 10px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
    }

    .year-row {
      display: flex;
      align-items: center;
      height: 24px;
      white-space: nowrap;
    }
    
    /* 연도 라벨 선명도 조절 */
    .year-label {
      font-size: 12px;
      color: #e6f2ff;
      font-weight: 500;
      width: 45px;
      flex-shrink: 0;
    }

    /* 🌊 이미지 image_a82ba1.png의 게이지 바 트랙 완벽 재현 */
    .bar-container {
      flex-grow: 1;
      height: 12px;
      background: rgba(255, 255, 255, 0.12); /* 비어있는 바 트랙 */
      border-radius: 6px;
      margin: 0 12px;
      position: relative;
      overflow: hidden;
    }

    /* 이미지 image_a82ba1.png의 은은하고 화사한 파란색 채움 그라데이션 */
    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #4da3ff 0%, #6bb5ff 100%);
      transition: width 1s ease-out;
    }

    /* 직전 버전에서 마음에 들어 하셨던 선명한 두께 600의 권 수 */
    .count-label {
      font-size: 11px;
      color: #ffffff;
      font-weight: 600;
      width: 35px;
      text-align: right;
      flex-shrink: 0;
    }

    /* 3. 고래고래 태그 최하단 고정 */
    .whale-tag {
      margin-top: 4px;
      align-self: flex-end;
      font-size: 10px;
      opacity: 0.8;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .whale-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffffff, #6bb5ff);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">오늘까지 읽은 책</div>
    <!-- 🗓️ 요청하셨던 YYYY-MM-DD 하이픈 포맷 적용 -->
    <div class="subtitle" id="dateText">0000-00-00 기준</div>
    
    <div class="big-number" id="totalCount">-<span>권</span></div>

    <!-- 연도별 게이지가 채워질 공간 -->
    <div class="years-container" id="yearStats"></div>

    <div class="whale-tag">
      <div class="whale-dot"></div>
      <span>고래고래는 다 읽었다</span>
    </div>
  </div>

  <script>
    // 오늘 날짜 포맷팅 (YYYY-MM-DD)
    function setTodayDate() {
      const dateEl = document.getElementById("dateText");
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      dateEl.textContent = `${yyyy}-${mm}-${dd} 기준`;
    }

    async function fetchStats() {
      const totalEl = document.getElementById("totalCount");
      const yearsEl = document.getElementById("yearStats");

      try {
        // 기존 독서량 카운트 API 호출
        const res = await fetch("https://whale-reading-api.vercel.app/api/reading-stats");
        const data = await res.json();
        const { totalCompletedCount, yearStats } = data;

        // 총 완독 권수 반영
        totalEl.innerHTML = `${totalCompletedCount}<span>권</span>`;

        if (!yearStats || yearStats.length === 0) {
          yearsEl.innerHTML = `<div style="font-size:12px; opacity:0.6; text-align:center; padding-top:40px;">아직 완독한 책이 없어요 🐋</div>`;
          return;
        }

        // 그래프 가로폭 계산을 위한 최댓값 추출
        const maxCount = Math.max(...yearStats.map(y => y.count));
        
        // 데이터 역순 정렬 (최신 연도가 맨 위로 오도록 설정)
        const sortedYearStats = [...yearStats].sort((a, b) => b.year - a.year);

        // 이미지 image_a82ba1.png 구조대로 차트 바 동적 생성
        yearsEl.innerHTML = sortedYearStats.map(y => {
          const barWidth = maxCount > 0 ? (y.count / maxCount) * 100 : 0; 
          return `
            <div class="year-row">
              <span class="year-label">${y.year}년</span>
              <div class="bar-container">
                <div class="bar-fill" style="width: ${barWidth}%;"></div>
              </div>
              <span class="count-label">${y.count}권</span>
            </div>
          `;
        }).join("");

      } catch (e) {
        console.error(e);
        document.getElementById("dateText").textContent = "로드 실패";
      }
    }

    // 초기화 함수 실행
    setTodayDate();
    fetchStats();
  </script>
</body>
</html>
