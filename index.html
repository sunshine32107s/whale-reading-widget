<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Reading Topics Horizontal Wide Widget</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    
    /* 1. 세로 높이를 220px ➡️ 260px로 넉넉하게 확장하여 답답함 해소 */
    .card {
      width: 460px;
      height: 260px;
      border-radius: 20px;
      padding: 24px 24px;
      /* 🌊 [배경 보정] 135도 대각선 방향으로 부드럽고 몽환적으로 흐르는 딥오션 파스텔 그라데이션 */
      background: linear-gradient(135deg, #2b7fff 0%, #1a224e 45%, #0b0f23 100%);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      position: relative;
      display: flex;
      flex-direction: column;
      color: #e9f5ff;
    }
    
    /* 상단 타이틀 바 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 22px; /* 컨텐츠와의 간격 확보 */
    }
    .title { font-size: 14px; opacity: 0.95; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 11px; opacity: 0.65; font-weight: 500; }
    
    /* 2. 가로형 분할 그리드 (높이가 늘어나 행간에 숨통이 트입니다) */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 32px; /* 양쪽 여백을 조금 더 넓혀 시원하게 배치 */
      row-gap: 12px;    /* 상하 줄 간격 여유 있게 조정 */
      flex-grow: 1;
    }
    
    /* 3. 오픈형 투명 라인 디자인 */
    .topic-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 6px;
      font-size: 12px;
    }

    .topic-info {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    /* 네온 하늘색 그라데이션 효과 */
    .rank {
      font-size: 12px;
      font-weight: 800;
      background: linear-gradient(135deg, #7ad0ff 0%, #3d8bff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
    }

    /* 자연스러운 줄바꿈 처리 */
    .name {
      font-weight: 600;
      color: #ffffff;
      word-break: break-all;
      white-space: normal;
      line-height: 1.3;
    }

    .count {
      font-size: 11px;
      color: #b9d8ff;
      font-weight: 600;
      margin-left: 8px;
      flex-shrink: 0;
    }

    /* 4. 고래고래 태그 최하단 고정 */
    .whale-tag {
      margin-top: 10px;
      align-self: flex-end;
      font-size: 10px;
      opacity: 0.7;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .whale-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9ad7ff, #4b8dff);
      box-shadow: 0 0 6px rgba(100, 193, 255, 0.9);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <div class="title">가장 많이 읽은 주제 TOP 10</div>
      <div class="subtitle" id="dateText">0000. 00. 00 기준</div>
    </div>

    <div class="grid-container" id="gridContainer"></div>

    <div class="whale-tag">
      <div class="whale-dot"></div>
      <span>고래고래는 다 읽었다</span>
    </div>
  </div>

  <script>
    // 오늘 날짜 세팅
    function setTodayDate() {
      const dateEl = document.getElementById("dateText");
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      dateEl.textContent = `${yyyy}- ${mm}- ${dd} 기준`;
    }

    async function fetchTopicStats() {
      const containerEl = document.getElementById("gridContainer");

      try {
        const res = await fetch("https://whale-reading-api.vercel.app/api/book-topics");
        const data = await res.json();
        
        if (data.success && data.topTopics) {
          if (data.topTopics.length === 0) {
            containerEl.innerHTML = `<div style="grid-column: span 2; font-size:12px; opacity:0.6; text-align:center; padding-top:60px;">기록된 주제 데이터가 없어요 🐋</div>`;
            return;
          }

          containerEl.innerHTML = data.topTopics.map((topic, index) => {
            return `
              <div class="topic-item">
                <div class="topic-info">
                  <span class="rank">${index + 1}</span>
                  <span class="name">${topic.name}</span>
                </div>
                <span class="count">${topic.count}권</span>
              </div>
            `;
          }).join("");
          
        } else {
          document.getElementById("dateText").textContent = "데이터 구조 오류";
        }
      } catch (e) {
        console.error(e);
        document.getElementById("dateText").textContent = "로드 실패";
      }
    }

    setTodayDate();
    fetchTopicStats();
  </script>
</body>
</html>
