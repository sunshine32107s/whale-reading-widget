<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Reading Stats Widget - Compact Set</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    
    /* 1. 세로 높이를 380px ➡️ 300px로 확 줄여서 휑한 공간을 원천 차단 */
    .card {
      width: 280px; 
      height: 300px; 
      border-radius: 20px;
      padding: 22px 24px;
      background: linear-gradient(135deg, #6bb5ff 0%, #1c52d9 60%, #0d2873 100%);
      box-shadow: 0 10px 25px rgba(13, 40, 115, 0.2); 
      position: relative;
      display: flex;
      flex-direction: column;
      color: #ffffff;
    }
    
    .title { font-size: 14px; color: #ffffff; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 11px; color: rgba(255, 255, 255, 0.75); font-weight: 500; margin-top: 2px; }
    
    .big-number { 
      margin: 12px 0 10px 0; /* 마진도 살짝 더 컴팩트하게 조율 */
      font-size: 34px; 
      font-weight: 700; 
      color: #ffffff; 
      letter-spacing: -0.5px;
    }
    .big-number span { font-size: 16px; font-weight: 500; opacity: 0.8; margin-left: 3px; }
    
    /* 2. 연도별 차트 영역 (불필요한 마진 제거) */
    .years-container {
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      gap: 10px; /* 연도 간격을 쫀쫀하게 조절 */
    }

    .year-row {
      display: flex;
      align-items: center;
      height: 22px;
      white-space: nowrap;
    }
    
    .year-label {
      font-size: 12px;
      color: #e6f2ff;
      font-weight: 500;
      width: 45px;
      flex-shrink: 0;
    }

    .bar-container {
      flex-grow: 1;
      height: 12px;
      background: rgba(255, 255, 255, 0.12); 
      border-radius: 6px;
      margin: 0 12px;
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #4da3ff 0%, #6bb5ff 100%);
      transition: width 1s ease-out;
    }

    .count-label {
      font-size: 11px;
      color: #ffffff;
      font-weight: 600;
      width: 35px;
      text-align: right;
      flex-shrink: 0;
    }

    /* 3. 고래고래 태그 하단 고정 여백 최적화 */
    .whale-tag {
      margin-top: auto; /* 카드 맨 밑바닥에 딱 달라붙도록 설정 */
      align-self: flex-end;
      font-size: 10px;
      opacity: 0.8;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .whale-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffffff, #6bb5ff);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">오늘까지 읽은 책🐳</div>
    <div class="subtitle" id="dateText">0000-00-00 기준</div>
    
    <div class="big-number" id="totalCount">-<span>권</span></div>

    <div class="years-container" id="yearStats"></div>

    <div class="whale-tag">
      <div class="whale-dot"></div>
      <span>고래고래는 다 읽었다</span>
    </div>
  </div>

  <script>
    function setTodayDate() {
      const dateEl = document.getElementById("dateText");
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      dateEl.textContent = `${yyyy}-${mm}-${dd} 기준`;
    }

    async function fetchStats() {
      const totalEl = document.getElementById("totalCount");
      const yearsEl = document.getElementById("yearStats");

      try {
        const res = await fetch("https://whale-reading-api.vercel.app/api/reading-stats");
        const data = await res.json();
        const { totalCompletedCount, yearStats } = data;

        totalEl.innerHTML = `${totalCompletedCount}<span>권</span>`;

        if (!yearStats || yearStats.length === 0) {
          yearsEl.innerHTML = `<div style="font-size:12px; opacity:0.6; text-align:center; padding-top:40px;">아직 완독한 책이 없어요 🐋</div>`;
          return;
        }

        const maxCount = Math.max(...yearStats.map(y => y.count));
        const sortedYearStats = [...yearStats].sort((a, b) => b.year - a.year);

        yearsEl.innerHTML = sortedYearStats.map(y => {
          const barWidth = maxCount > 0 ? (y.count / maxCount) * 100 : 0; 
          return `
            <div class="year-row">
              <span class="year-label">${y.year}년</span>
              <div class="bar-container">
                <div class="bar-fill" style="width: ${barWidth}%;"></div>
              </div>
              <span class="count-label">${y.count}권</span>
            </div>
          `;
        }).join("");

      } catch (e) {
        console.error(e);
        document.getElementById("dateText").textContent = "로드 실패";
      }
    }

    setTodayDate();
    fetchStats();
  </script>
</body>
</html>
