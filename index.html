<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Reading Stats Widget</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    .card {
      width: 280px;
      border-radius: 18px;
      padding: 20px;
      background: radial-gradient(circle at top left, #3fa4ff, #151b3f 65%, #050814);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.55);
      position: relative;
      display: flex;
      flex-direction: column;
      color: #e9f5ff;
    }
    .title { font-size: 13px; opacity: 0.9; }
    .subtitle { font-size: 11px; opacity: 0.75; margin-top: 4px; }
    .big-number { margin: 15px 0; font-size: 32px; font-weight: 700; color: #ffffff; }
    .big-number span { font-size: 16px; opacity: 0.8; margin-left: 4px; }
    
    .years {
      margin-top: 5px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .year-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      height: 24px;
      white-space: nowrap;
    }
    .year-label {
      font-size: 12px;
      color: #b9d8ff;
      width: 45px;
      flex-shrink: 0;
    }

    .bar-container {
      flex-grow: 1;
      height: 14px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 7px;
      margin: 0 10px;
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      border-radius: 7px;
      /* 배경을 아주 진한 남색으로 깔아 물결 색상과 대비시킴 */
      background: #0d2c5e; 
      transition: width 1.2s ease-out;
      overflow: hidden;
    }

    /* 물결 자체에 색상을 부여하여 확실히 보이게 함 */
    .wave {
      position: absolute;
      width: 200%;
      height: 100%;
      background-image: url('https://svgshare.com/i/157r.svg');
      background-size: 50% 100%;
      background-repeat: repeat-x;
      /* 파란색 색감을 입히고 불투명도를 높임 */
      filter: invert(74%) sepia(59%) saturate(452%) hue-rotate(175deg) brightness(103%) contrast(101%);
      opacity: 0.9;
      animation: waveMove 3s linear infinite;
    }

    /* 뒷물결은 더 밝은 하늘색으로 설정 */
    .wave-back {
      opacity: 0.5;
      filter: invert(93%) sepia(21%) saturate(1251%) hue-rotate(174deg) brightness(101%) contrast(104%);
      animation: waveMove 5s linear infinite reverse;
      bottom: 1px;
    }

    @keyframes waveMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .count-label {
      font-size: 12px;
      color: #ffffff;
      width: 35px;
      text-align: right;
      flex-shrink: 0;
    }

    .whale-tag {
      margin-top: 15px;
      align-self: flex-end;
      font-size: 11px;
      opacity: 0.8;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .whale-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9ad7ff, #4b8dff);
      box-shadow: 0 0 8px rgba(100, 193, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">오늘까지 완독한 책</div>
    <div class="subtitle" id="dateText">데이터 로딩 중...</div>
    <div class="big-number" id="totalCount">- <span>권</span></div>

    <div class="years" id="yearStats"></div>

    <div class="whale-tag">
      <div class="whale-dot"></div>
      <span>고래고래는 다 읽었다</span>
    </div>
  </div>

  <script>
    async function fetchStats() {
      const dateEl = document.getElementById("dateText");
      const totalEl = document.getElementById("totalCount");
      const yearsEl = document.getElementById("yearStats");

      try {
        const res = await fetch("https://whale-reading-api.vercel.app/api/reading-stats");
        const data = await res.json();
        const { today, totalCompletedCount, yearStats } = data;

        dateEl.textContent = `${today} 기준`;
        totalEl.innerHTML = `${totalCompletedCount}<span> 권</span>`;

        if (!yearStats || yearStats.length === 0) {
          yearsEl.textContent = "아직 완독한 책이 없어요 🐋";
        } else {
          const maxCount = Math.max(...yearStats.map(y => y.count));
          
          yearsEl.innerHTML = yearStats.map(y => {
            const barWidth = (y.count / maxCount) * 100; 
            return `
              <div class="year-row">
                <span class="year-label">${y.year}년</span>
                <div class="bar-container">
                  <div class="bar-fill" style="width: ${barWidth}%;">
                    <div class="wave"></div>
                    <div class="wave wave-back"></div>
                  </div>
                </div>
                <span class="count-label">${y.count}권</span>
              </div>
            `;
          }).join("");
        }
      } catch (e) {
        console.error(e);
        dateEl.textContent = "데이터를 불러오지 못했습니다.";
      }
    }
    fetchStats();
  </script>
</body>
</html>
